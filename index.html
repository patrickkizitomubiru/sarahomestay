<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SARAH'S HOMESTAY · Invoice with QR</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sarah's Homestay">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#a4622c">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #eef2f5;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 1rem;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.75rem;
      margin-bottom: 1.2rem;
    }
    .card-header h2 {
      font-size: 1.35rem;
      word-break: break-word;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .input-group label {
      font-size: 0.85rem;
      font-weight: 500;
    }
    .input-group input, .input-group select {
      padding: 0.7rem;
      border: 1px solid #cbd5e1;
      border-radius: 1rem;
      font-size: 0.95rem;
      background: white;
      width: 100%;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 0.5rem;
    }
    .services-table {
      width: 100%;
      min-width: 600px;
      border-collapse: collapse;
    }
    .services-table th, .services-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: middle;
      font-size: 0.85rem;
    }
    .services-table input, .services-table select {
      width: 100%;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 0.85rem;
    }

    .add-btn, .primary-btn, .reset-btn {
      background: #a4622c;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .save-pdf-btn { background: #1e6f3f; }
    .print-btn { background: #2c3e66; }
    .reset-btn { background: #9e2d2f; }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .receipt-preview {
      background: white;
      overflow-x: auto;
    }
    .receipt-paper {
      max-width: 100%;
      margin: 0 auto;
      font-size: 0.85rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .receipt-brand-header {
      text-align: center;
      border-bottom: 2px solid #ffe0b5;
      padding-bottom: 0.6rem;
      margin-bottom: 0.8rem;
    }
    .receipt-company { font-size: 1.5rem; font-weight: 800; color: #a4622c; }
    .receipt-tagline { font-size: 0.7rem; font-weight: 500; color: #b87c4a; }
    .receipt-contact-bar {
      background: #fef3e8;
      padding: 6px 10px;
      border-radius: 40px;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      font-size: 0.65rem;
      margin-top: 6px;
    }
    .client-block {
      background: #f9fafb;
      padding: 0.6rem;
      border-radius: 1rem;
      margin: 0.6rem 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      font-size: 0.8rem;
    }
    .receipt-items-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.6rem 0;
      font-size: 0.75rem;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .receipt-items-table thead, .receipt-items-table tbody {
      display: table;
      width: 100%;
      min-width: 400px;
    }
    .receipt-items-table th, .receipt-items-table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 6px 4px;
      text-align: left;
      vertical-align: top;
    }
    .terms-section, .payment-details, .mobile-money-section {
      background: #fefaf5;
      padding: 0.6rem;
      border-radius: 0.8rem;
      margin: 0.6rem 0;
      font-size: 0.7rem;
      border-left: 3px solid #b87c4a;
      word-break: break-word;
    }
    .total-display {
      text-align: right;
      margin-top: 0.6rem;
      font-weight: 800;
      background: #fef3e8;
      padding: 0.6rem;
      border-radius: 0.8rem;
      font-size: 0.85rem;
      word-break: break-word;
    }
    .balance-due-block {
      background: #f1f5f9;
      padding: 0.6rem;
      border-radius: 0.8rem;
      margin: 0.6rem 0;
      text-align: right;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .qr-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.8rem 0;
      background: #fff;
      padding: 0.5rem;
      border-radius: 1rem;
    }
    canvas.qr-code {
      border: 1px solid #ddd;
      padding: 5px;
      background: white;
      width: 130px;
      height: 130px;
      max-width: 100%;
      object-fit: contain;
    }
    .qr-caption {
      text-align: center;
      font-size: 0.6rem;
      color: #6c757d;
      margin-top: 0.3rem;
    }
    .footer-single, .timestamp-footer {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 0.6rem;
    }
    .timestamp-footer {
      color: #6c757d;
      border-top: 1px dashed #ccc;
      padding-top: 0.4rem;
    }

    @media (max-width: 640px) {
      body { padding: 0.75rem; }
      .card { padding: 1rem; }
      .receipt-company { font-size: 1.3rem; }
      .client-block { grid-template-columns: 1fr; }
      canvas.qr-code { width: 110px; height: 110px; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 0.5rem; }
      .dashboard { gap: 0.8rem; }
      .card { padding: 0.8rem; }
    }

    @media print {
      body { margin: 0; padding: 0; background: white; }
      .card.receipt-preview { padding: 0; margin: 0; box-shadow: none; background: white; display: block; }
      .receipt-paper { max-width: 100%; padding: 0; margin: 0; display: block; }
      .action-buttons, .card:not(.receipt-preview) { display: none !important; }
      .qr-container { break-inside: avoid; }
      @page { size: A4; margin: 12mm; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="dashboard">
    <!-- Input Card -->
    <div class="card">
      <div class="card-header">
        <h2>🧾 SARAH'S HOMESTAY · Invoice with QR</h2>
      </div>
      <div class="form-grid">
        <div class="input-group"><label>📅 Invoice Date</label><input type="date" id="receiptDate"></div>
        <div class="input-group"><label>👤 Client Name</label><input type="text" id="clientName" placeholder="Full name" value="KUBIRU ETIZO"></div>
        <div class="input-group"><label>📞 Client Contact</label><input type="text" id="clientContact" placeholder="Phone / Email" value="0781889282"></div>
        <div class="input-group"><label>📍 Facility Location</label><input type="text" id="facilityLocation" placeholder="e.g., Ababira" value="ABABIRA"></div>
      </div>
      <div class="services-section">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
          <span>🛎️ Services (UGX)</span>
          <button type="button" id="addServiceBtn" class="add-btn">+ Add service</button>
        </div>
        <div class="table-wrapper">
          <table class="services-table" id="servicesTable">
            <thead><tr><th>Description</th><th>Duration</th><th>Unit</th><th>Rate (UGX)</th><th>Amount (UGX)</th><th></th></tr></thead>
            <tbody id="servicesTbody"></tbody>
          </table>
        </div>
        <div class="total-display" id="totalAmountDisplay">💰 Total Invoice: UGX 450,000</div>
      </div>
      <div class="input-group" style="margin-top: 0.5rem; max-width: 300px;">
        <label>💵 Amount Paid (UGX)</label>
        <input type="number" id="amountPaid" value="100000" step="1000">
      </div>
      <div class="action-buttons">
        <button id="refreshPreviewBtn" class="primary-btn">🔄 Refresh Preview</button>
        <button id="newInvoiceBtn" class="reset-btn">🆕 New Invoice (Next #)</button>
        <button id="savePdfBtn" class="primary-btn save-pdf-btn">📄 Save as PDF</button>
        <button id="printBtn" class="primary-btn print-btn">🖨️ Print</button>
      </div>
    </div>
    <!-- Receipt Preview with QR -->
    <div class="card receipt-preview">
      <div id="receiptContainer" class="receipt-paper"></div>
    </div>
  </div>
</div>

<script>
  // BUSINESS DATA
  const BUSINESS = {
    name: "SARAH'S HOMESTAY",
    tagline: "FOR FULLY FURNISHED APARTMENTS",
    phone: "+256 752 321177",
    email: "sarahzhomestay@gmail.com",
    address: "Mpala, Entebbe Road"
  };
  const BANK_DETAILS = {
    accountNumber: "7202502003",
    accountName: "Nakibuule Sarah",
    bank: "Eco bank",
    country: "Uganda"
  };
  const AIRTEL_MONEY = {
    title: "Airtel Money Pay",
    merchantCode: "6633236",
    accountName: "Sarah Homestay",
    country: "Uganda"
  };
  const TERMS = [
    "Check in from 12:00pm",
    "Check out 11:00am",
    "No smoking inside the rooms",
    "No parties allowed",
    "Switch off all electronics and gas before leaving the facility"
  ];

  // Daily invoice counter
  function getTodayDateStr() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    return `${yyyy}${mm}${dd}`;
  }

  function getDailyCounter(dateStr) {
    const stored = localStorage.getItem('sarahs_invoice_daily');
    let data = stored ? JSON.parse(stored) : {};
    return data[dateStr] || 0;
  }

  function incrementDailyCounter(dateStr) {
    const stored = localStorage.getItem('sarahs_invoice_daily');
    let data = stored ? JSON.parse(stored) : {};
    const next = (data[dateStr] || 0) + 1;
    data[dateStr] = next;
    localStorage.setItem('sarahs_invoice_daily', JSON.stringify(data));
    return next;
  }

  function generateInvoiceNumber() {
    const dateStr = getTodayDateStr();
    const nextSeq = incrementDailyCounter(dateStr);
    return `INV-${dateStr}-${String(nextSeq).padStart(4, '0')}`;
  }

  let currentInvoiceNumber = generateInvoiceNumber();
  function refreshInvoiceNumber() {
    currentInvoiceNumber = generateInvoiceNumber();
    return currentInvoiceNumber;
  }

  function getCurrentTimestamp() {
    return new Date().toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // Services array
  let services = [
    { description: "Accommodation", duration: 3, unit: "nights", rate: 150000, amount: 450000 }
  ];

  function recalcAmount(idx) {
    services[idx].amount = (services[idx].duration || 0) * (services[idx].rate || 0);
    return services[idx].amount;
  }
  function updateTotal() {
    let total = services.reduce((s, i) => s + i.amount, 0);
    document.getElementById('totalAmountDisplay').innerHTML = `💰 Total Invoice: UGX ${total.toLocaleString()}`;
    return total;
  }

  function renderServicesTable() {
    const tbody = document.getElementById('servicesTbody');
    tbody.innerHTML = '';
    services.forEach((s, idx) => {
      const row = tbody.insertRow();
      let td0 = row.insertCell(0);
      let inpDesc = document.createElement('input');
      inpDesc.value = s.description;
      inpDesc.oninput = e => { services[idx].description = e.target.value; updatePreview(); };
      td0.appendChild(inpDesc);

      let td1 = row.insertCell(1);
      let inpDur = document.createElement('input');
      inpDur.type = 'number'; inpDur.step = 0.5; inpDur.value = s.duration;
      inpDur.oninput = e => {
        services[idx].duration = parseFloat(e.target.value) || 0;
        recalcAmount(idx);
        amountSpan.innerText = services[idx].amount.toLocaleString();
        updateTotal(); updatePreview();
      };
      td1.appendChild(inpDur);

      let tdUnit = row.insertCell(2);
      let unitSelect = document.createElement('select');
      let optDays = document.createElement('option'); optDays.value = 'days'; optDays.text = 'Days';
      let optNights = document.createElement('option'); optNights.value = 'nights'; optNights.text = 'Nights';
      if (s.unit === 'days') optDays.selected = true; else optNights.selected = true;
      unitSelect.appendChild(optDays); unitSelect.appendChild(optNights);
      unitSelect.onchange = e => { services[idx].unit = e.target.value; updatePreview(); };
      tdUnit.appendChild(unitSelect);

      let tdRate = row.insertCell(3);
      let inpRate = document.createElement('input');
      inpRate.type = 'number'; inpRate.step = 1000; inpRate.value = s.rate;
      inpRate.oninput = e => {
        services[idx].rate = parseFloat(e.target.value) || 0;
        recalcAmount(idx);
        amountSpan.innerText = services[idx].amount.toLocaleString();
        updateTotal(); updatePreview();
      };
      tdRate.appendChild(inpRate);

      let tdAmount = row.insertCell(4);
      let amountSpan = document.createElement('span');
      amountSpan.innerText = s.amount.toLocaleString();
      tdAmount.appendChild(amountSpan);

      let tdDel = row.insertCell(5);
      let delBtn = document.createElement('button');
      delBtn.innerText = '✖'; delBtn.style.cssText = 'background:none; border:none; font-size:1.2rem; cursor:pointer;';
      delBtn.onclick = () => { services.splice(idx,1); renderServicesTable(); updateTotal(); updatePreview(); };
      tdDel.appendChild(delBtn);
    });
    updateTotal();
  }
  renderServicesTable();
  document.getElementById('addServiceBtn').onclick = () => {
    services.push({ description: "New service", duration: 1, unit: "days", rate: 50000, amount: 50000 });
    renderServicesTable();
    updatePreview();
  };

  const amountPaidInput = document.getElementById('amountPaid');
  const clientNameInput = document.getElementById('clientName');
  const clientContactInput = document.getElementById('clientContact');
  const facilityInput = document.getElementById('facilityLocation');
  const receiptDateInput = document.getElementById('receiptDate');
  receiptDateInput.value = new Date().toISOString().slice(0,10);

  function updatePreview() {
    const container = document.getElementById('receiptContainer');
    if (container) {
      container.innerHTML = generateInvoiceHTML();
      generateQRCodeInInvoice();
    }
  }
  [amountPaidInput, clientNameInput, clientContactInput, facilityInput, receiptDateInput].forEach(el => el.addEventListener('input', updatePreview));

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  // Generate the full invoice HTML including QR container (canvas added after generation)
  function generateInvoiceHTML() {
    const date = receiptDateInput.value;
    const client = clientNameInput.value.trim() || "KUBIRU ETIZO";
    const contact = clientContactInput.value.trim() || "0781889282";
    const facility = facilityInput.value.trim() || "ABABIRA";
    const total = services.reduce((s,i) => s + i.amount, 0);
    let amountPaid = parseFloat(amountPaidInput.value);
    if (isNaN(amountPaid)) amountPaid = 0;
    if (amountPaid > total) amountPaid = total;
    const balanceDue = total - amountPaid;
    const itemsHtml = services.map(s => `
      <tr>
        <td style="padding:4px 4px">${escapeHtml(s.description)}</td>
        <td style="padding:4px 4px">${s.duration}</td>
        <td style="padding:4px 4px">${s.unit}</td>
        <td style="padding:4px 4px">UGX ${s.rate.toLocaleString()}</td>
        <td style="text-align:right">UGX ${s.amount.toLocaleString()}</td>
      </tr>
    `).join('');
    return `
      <div>
        <div class="receipt-brand-header">
          <div class="receipt-company">SARAH'S HOMESTAY</div>
          <div class="receipt-tagline">FOR FULLY FURNISHED APARTMENTS</div>
          <div class="receipt-contact-bar">📞 ${BUSINESS.phone} &nbsp;|&nbsp; ✉️ ${BUSINESS.email} &nbsp;|&nbsp; 📍 ${BUSINESS.address}</div>
        </div>
        <div class="client-block">
          <div><strong>Invoice Date:</strong> ${escapeHtml(date)}</div>
          <div><strong>Invoice Number:</strong> ${currentInvoiceNumber}</div>
          <div><strong>Client:</strong> ${escapeHtml(client)}</div>
          <div><strong>Contact:</strong> ${escapeHtml(contact)}</div>
          <div><strong>📍 Facility Location:</strong> ${escapeHtml(facility)}</div>
        </div>
        <table class="receipt-items-table">
          <thead><tr><th>Service</th><th>Duration</th><th>Unit</th><th>Rate (UGX)</th><th style="text-align:right">Amount (UGX)</th></tr></thead>
          <tbody>${itemsHtml || '<tr><td colspan="5">No services</td></tr>'}</tbody>
        </table>
        <div style="text-align:right; font-weight:800; margin:8px 0; padding:6px; background:#fef3e8; border-radius:10px;">Total Invoice: UGX ${total.toLocaleString()}</div>
        <div style="text-align:right; margin:4px 0;"><span>💵 Amount Paid: UGX ${amountPaid.toLocaleString()}</span></div>
        <div class="balance-due-block"><strong>⚖️ Balance due:</strong> UGX ${balanceDue.toLocaleString()}</div>
        <div class="terms-section"><strong>📜 Terms & Conditions</strong><br>• ${TERMS.join('<br>• ')}</div>
        <div class="payment-details"><strong>🏦 Payment Options</strong><br>• Bank Transfer<br>• Account Number: ${BANK_DETAILS.accountNumber}<br>• Account Name: ${BANK_DETAILS.accountName}<br>• Bank: ${BANK_DETAILS.bank}<br>• Country: ${BANK_DETAILS.country}</div>
        <div class="mobile-money-section"><strong>📱 ${AIRTEL_MONEY.title}</strong><br>Merchant code: ${AIRTEL_MONEY.merchantCode}<br>Account Name: ${AIRTEL_MONEY.accountName}<br>Country: ${AIRTEL_MONEY.country}</div>
        <hr>
        <div class="qr-container">
          <canvas id="invoiceQrCanvas" class="qr-code" width="130" height="130"></canvas>
        </div>
        <div class="qr-caption">Scan to view invoice details</div>
        <div style="margin-top:0.5rem; font-size:0.75rem; text-align:center;"><strong>Authorized by: Management</strong></div>
        <div style="font-size:0.65rem; text-align:center; margin-top:0.6rem;">Thank you for choosing SARAH'S HOMESTAY</div>
        <div class="footer-single">SARAH'S HOMESTAY</div>
        <div class="timestamp-footer">🕒 Generated on: ${getCurrentTimestamp()}</div>
      </div>`;
  }

  // Generate QR code with all invoice details
  async function generateQRCodeInInvoice() {
    const canvas = document.getElementById('invoiceQrCanvas');
    if (!canvas) return;
    if (typeof QRCode === 'undefined') {
      console.warn("QRCode library not loaded");
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f0f0f0'; ctx.fillRect(0,0,130,130);
      ctx.fillStyle = '#a00'; ctx.font = '10px sans-serif'; ctx.fillText('QR lib missing', 20, 65);
      return;
    }
    const total = services.reduce((s,i) => s + i.amount, 0);
    let amountPaid = parseFloat(amountPaidInput.value);
    if (isNaN(amountPaid)) amountPaid = 0;
    const client = clientNameInput.value.trim() || "KUBIRU ETIZO";
    const contact = clientContactInput.value.trim() || "0781889282";
    const facility = facilityInput.value.trim() || "ABABIRA";
    const balance = Math.max(0, total - amountPaid);
    const qrText = `INVOICE\n#: ${currentInvoiceNumber}\nDate: ${receiptDateInput.value}\nClient: ${client}\nContact: ${contact}\nFacility: ${facility}\nTotal: UGX ${total.toLocaleString()}\nPaid: UGX ${amountPaid.toLocaleString()}\nBalance: UGX ${balance.toLocaleString()}\nThank you - SARAH'S HOMESTAY`;
    try {
      await QRCode.toCanvas(canvas, qrText, { width: 130, margin: 2, color: { dark: '#000000', light: '#ffffff' } });
    } catch(e) {
      console.warn(e);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffeeee'; ctx.fillRect(0,0,130,130);
      ctx.fillStyle = '#a00'; ctx.font = '10px sans-serif'; ctx.fillText('QR error', 35, 65);
    }
  }

  async function exportAsPDF() {
    const element = document.getElementById('receiptContainer');
    const filename = `invoice_${currentInvoiceNumber}.pdf`;
    html2pdf().set({
      margin: [0.5,0.5,0.5,0.5],
      filename: filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    }).from(element).save();
  }

  document.getElementById('refreshPreviewBtn').onclick = updatePreview;
  document.getElementById('printBtn').onclick = () => { updatePreview(); setTimeout(() => window.print(), 100); };
  document.getElementById('savePdfBtn').onclick = exportAsPDF;
  document.getElementById('newInvoiceBtn').onclick = () => {
    clientNameInput.value = "KUBIRU ETIZO";
    clientContactInput.value = "0781889282";
    facilityInput.value = "ABABIRA";
    receiptDateInput.value = new Date().toISOString().slice(0,10);
    amountPaidInput.value = "100000";
    services = [{ description: "Accommodation", duration: 3, unit: "nights", rate: 150000, amount: 450000 }];
    renderServicesTable();
    currentInvoiceNumber = refreshInvoiceNumber();
    updatePreview();
  };
  window.onload = updatePreview;
</script>
</body>
</html>
